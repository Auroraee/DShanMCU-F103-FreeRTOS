<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreeRTOS 题库 - DShanMCU-F103</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0e1a;
  --bg-panel: #111827;
  --bg-card: #1a2236;
  --bg-hover: #1f2a42;
  --border: #2a3a5c;
  --border-light: #3b4f7a;
  --cyan: #22d3ee;
  --cyan-dim: #0e7490;
  --cyan-glow: rgba(34,211,238,0.15);
  --green: #4ade80;
  --green-dim: #166534;
  --red: #f87171;
  --red-dim: #7f1d1d;
  --amber: #fbbf24;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-muted: #64748b;
  --font-code: 'JetBrains Mono', monospace;
  --font-body: 'Noto Sans SC', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

html { font-size: 16px; }

body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(34,211,238,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34,211,238,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* Scanline effect */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
}

/* ===== HEADER ===== */
.header {
  text-align: center;
  padding: 48px 0 32px;
  position: relative;
}

.header::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 120px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
}

.header-tag {
  font-family: var(--font-code);
  font-size: 0.7rem;
  color: var(--cyan);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 12px;
  opacity: 0.8;
}

.header h1 {
  font-size: 2.2rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--cyan), #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}

.header-sub {
  color: var(--text-dim);
  font-size: 0.95rem;
}

/* ===== STATS BAR ===== */
.stats-bar {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 24px 0;
}

.stat-item {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 20px;
  text-align: center;
  min-width: 120px;
}

.stat-value {
  font-family: var(--font-code);
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--cyan);
}

.stat-label {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ===== MODE: CHAPTER SELECT ===== */
.screen { display: none; }
.screen.active { display: block; }

.chapter-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
  margin-top: 24px;
}

.chapter-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px;
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}

.chapter-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--cyan);
  opacity: 0;
  transition: opacity 0.25s;
}

.chapter-card:hover {
  border-color: var(--cyan-dim);
  background: var(--bg-hover);
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(34,211,238,0.08);
}

.chapter-card:hover::before { opacity: 1; }

.chapter-num {
  font-family: var(--font-code);
  font-size: 0.7rem;
  color: var(--cyan);
  letter-spacing: 2px;
  margin-bottom: 6px;
}

.chapter-title {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 6px;
}

.chapter-meta {
  font-size: 0.8rem;
  color: var(--text-muted);
}

.chapter-progress {
  margin-top: 10px;
  height: 3px;
  background: var(--bg-deep);
  border-radius: 2px;
  overflow: hidden;
}

.chapter-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--green));
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* Mixed quiz button */
.mixed-quiz-btn {
  display: block;
  width: 100%;
  margin-top: 20px;
  padding: 18px;
  background: linear-gradient(135deg, rgba(34,211,238,0.1), rgba(167,139,250,0.1));
  border: 1px solid var(--border-light);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s;
  text-align: center;
}

.mixed-quiz-btn:hover {
  border-color: var(--cyan);
  box-shadow: 0 0 30px rgba(34,211,238,0.1);
  transform: translateY(-2px);
}

.mixed-quiz-btn span {
  display: block;
  font-size: 0.8rem;
  color: var(--text-muted);
  font-weight: 400;
  margin-top: 4px;
}

/* ===== QUIZ SCREEN ===== */
.quiz-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}

.quiz-title {
  font-size: 1.1rem;
  font-weight: 600;
}

.quiz-counter {
  font-family: var(--font-code);
  font-size: 0.85rem;
  color: var(--cyan);
}

.progress-bar {
  width: 100%;
  height: 4px;
  background: var(--bg-deep);
  border-radius: 2px;
  margin-bottom: 24px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--green));
  border-radius: 2px;
  transition: width 0.4s ease;
}

.question-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px;
  margin-bottom: 20px;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.q-type-badge {
  display: inline-block;
  font-family: var(--font-code);
  font-size: 0.65rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 4px;
  margin-bottom: 14px;
}

.q-type-badge.single { background: rgba(34,211,238,0.15); color: var(--cyan); }
.q-type-badge.tf { background: rgba(251,191,36,0.15); color: var(--amber); }
.q-type-badge.fill { background: rgba(167,139,250,0.15); color: #a78bfa; }
.q-type-badge.multi { background: rgba(74,222,128,0.15); color: var(--green); }

.q-chapter-tag {
  font-family: var(--font-code);
  font-size: 0.65rem;
  color: var(--text-muted);
  margin-left: 8px;
}

.q-text {
  font-size: 1.05rem;
  line-height: 1.7;
  margin-bottom: 20px;
}

.q-text code {
  font-family: var(--font-code);
  font-size: 0.88em;
  background: rgba(34,211,238,0.1);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--cyan);
}

/* Options */
.options { display: flex; flex-direction: column; gap: 10px; }

.option-btn {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  font-family: var(--font-body);
  font-size: 0.95rem;
  color: var(--text);
  line-height: 1.6;
}

.option-btn:hover:not(.disabled) {
  border-color: var(--border-light);
  background: var(--bg-hover);
}

.option-letter {
  font-family: var(--font-code);
  font-weight: 600;
  font-size: 0.85rem;
  color: var(--text-muted);
  min-width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  background: var(--bg-deep);
  flex-shrink: 0;
  margin-top: 1px;
}

.option-btn.selected { border-color: var(--cyan-dim); background: var(--cyan-glow); }
.option-btn.selected .option-letter { color: var(--cyan); background: rgba(34,211,238,0.15); }

.option-btn.correct {
  border-color: var(--green) !important;
  background: rgba(74,222,128,0.08) !important;
}
.option-btn.correct .option-letter { color: var(--green); background: rgba(74,222,128,0.15); }

.option-btn.wrong {
  border-color: var(--red) !important;
  background: rgba(248,113,113,0.08) !important;
}
.option-btn.wrong .option-letter { color: var(--red); background: rgba(248,113,113,0.15); }

.option-btn.disabled { cursor: default; opacity: 0.7; }
.option-btn.disabled:hover { background: var(--bg-panel); border-color: var(--border); }

/* Fill in blank */
.fill-input-wrap {
  display: flex;
  gap: 10px;
  align-items: center;
}

.fill-input {
  flex: 1;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  font-family: var(--font-code);
  font-size: 0.95rem;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}

.fill-input:focus { border-color: var(--cyan-dim); }
.fill-input::placeholder { color: var(--text-muted); }

/* Feedback */
.feedback {
  margin-top: 16px;
  padding: 16px;
  border-radius: 8px;
  font-size: 0.9rem;
  line-height: 1.7;
  animation: fadeIn 0.3s ease;
}

.feedback.correct {
  background: rgba(74,222,128,0.08);
  border-left: 3px solid var(--green);
  color: var(--green);
}

.feedback.wrong {
  background: rgba(248,113,113,0.08);
  border-left: 3px solid var(--red);
  color: var(--red);
}

.feedback .explain {
  color: var(--text-dim);
  margin-top: 8px;
  font-size: 0.85rem;
}

.feedback code {
  font-family: var(--font-code);
  font-size: 0.85em;
  background: rgba(255,255,255,0.06);
  padding: 1px 5px;
  border-radius: 3px;
}

/* Navigation buttons */
.nav-row {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  flex-wrap: wrap;
}

.btn {
  padding: 10px 22px;
  border-radius: 8px;
  font-family: var(--font-body);
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text);
}

.btn:hover { border-color: var(--border-light); background: var(--bg-hover); }
.btn:disabled { opacity: 0.4; cursor: default; }

.btn-primary {
  background: var(--cyan-dim);
  border-color: var(--cyan);
  color: #fff;
}
.btn-primary:hover { background: #0891b2; }

.btn-back {
  background: transparent;
  border-color: var(--border);
  color: var(--text-dim);
}

/* ===== RESULTS SCREEN ===== */
.results-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 36px;
  text-align: center;
  margin-bottom: 24px;
}

.results-score {
  font-family: var(--font-code);
  font-size: 4rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--cyan), var(--green));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.results-label {
  color: var(--text-dim);
  margin-top: 4px;
}

.results-detail {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-top: 20px;
  flex-wrap: wrap;
}

.results-detail-item {
  text-align: center;
}

.results-detail-item .num {
  font-family: var(--font-code);
  font-size: 1.8rem;
  font-weight: 700;
}

.results-detail-item .num.green { color: var(--green); }
.results-detail-item .num.red { color: var(--red); }
.results-detail-item .lbl { font-size: 0.8rem; color: var(--text-muted); }

/* Review list */
.review-list { margin-top: 20px; }

.review-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.2s;
}

.review-item:hover { border-color: var(--border-light); }
.review-item.wrong-item { border-left: 3px solid var(--red); }
.review-item.correct-item { border-left: 3px solid var(--green); }

.review-item-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}

.review-item-num {
  font-family: var(--font-code);
  font-size: 0.75rem;
  color: var(--text-muted);
}

.review-item-status {
  font-size: 0.75rem;
  font-weight: 600;
}

.review-item-status.s { color: var(--green); }
.review-item-status.f { color: var(--red); }

.review-item-text {
  font-size: 0.9rem;
  color: var(--text-dim);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Responsive */
@media (max-width: 600px) {
  .container { padding: 12px; }
  .header h1 { font-size: 1.6rem; }
  .question-card { padding: 20px; }
  .stats-bar { gap: 8px; }
  .stat-item { min-width: 90px; padding: 8px 12px; }
  .stat-value { font-size: 1.1rem; }
  .chapter-grid { grid-template-columns: 1fr; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-tag">DShanMCU-F103 // Embedded Systems</div>
    <h1>FreeRTOS 题库</h1>
    <div class="header-sub">基于教程章节的交互式自测系统</div>
  </div>

  <div class="stats-bar" id="globalStats">
    <div class="stat-item"><div class="stat-value" id="statTotal">0</div><div class="stat-label">总题数</div></div>
    <div class="stat-item"><div class="stat-value" id="statDone">0</div><div class="stat-label">已完成</div></div>
    <div class="stat-item"><div class="stat-value" id="statCorrect">0</div><div class="stat-label">答对</div></div>
    <div class="stat-item"><div class="stat-value" id="statRate">-</div><div class="stat-label">正确率</div></div>
  </div>

  <!-- SCREEN: chapter select -->
  <div class="screen active" id="screenHome">
    <div class="chapter-grid" id="chapterGrid"></div>
    <button class="mixed-quiz-btn" onclick="startMixed()">
      综合测试
      <span>随机抽取 20 道题，覆盖全部章节</span>
    </button>
  </div>

  <!-- SCREEN: quiz -->
  <div class="screen" id="screenQuiz">
    <div class="quiz-header">
      <button class="btn btn-back" onclick="goHome()">&larr; 返回</button>
      <div class="quiz-title" id="quizTitle"></div>
      <div class="quiz-counter" id="quizCounter"></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div id="questionArea"></div>
    <div class="nav-row">
      <button class="btn" id="btnPrev" onclick="prevQ()">&larr; 上一题</button>
      <button class="btn btn-primary" id="btnNext" onclick="nextQ()">下一题 &rarr;</button>
      <button class="btn btn-primary" id="btnSubmit" onclick="finishQuiz()" style="display:none">提交答卷</button>
    </div>
  </div>

  <!-- SCREEN: results -->
  <div class="screen" id="screenResults">
    <div class="results-card">
      <div class="results-score" id="resultScore"></div>
      <div class="results-label">正确率</div>
      <div class="results-detail">
        <div class="results-detail-item"><div class="num green" id="resultCorrect"></div><div class="lbl">答对</div></div>
        <div class="results-detail-item"><div class="num red" id="resultWrong"></div><div class="lbl">答错</div></div>
        <div class="results-detail-item"><div class="num" id="resultTotal" style="color:var(--text)"></div><div class="lbl">总题数</div></div>
      </div>
    </div>
    <h3 style="margin-bottom:14px;color:var(--text-dim);font-size:0.95rem;">答题详情</h3>
    <div class="review-list" id="reviewList"></div>
    <div class="nav-row" style="margin-top:20px;">
      <button class="btn btn-back" onclick="goHome()">&larr; 返回首页</button>
      <button class="btn btn-primary" onclick="retryQuiz()">重新测试</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// QUESTION BANK
// ============================================================
const questions = [
// ===== CH7: FreeRTOS源码概述 =====
{id:1,ch:7,type:"single",q:"FreeRTOS 最核心的源码文件有几个？",opts:["1个","2个","3个","5个"],ans:1,explain:"最核心的文件只有 2 个：<code>tasks.c</code> 和 <code>list.c</code>。"},
{id:2,ch:7,type:"tf",q:"FreeRTOS 的移植文件位于 <code>portable/[compiler]/[architecture]</code> 目录下，包含 <code>port.c</code> 和 <code>portmacro.h</code>。",ans:true,explain:"移植文件确实位于该目录结构下，包含这两个关键文件。"},
{id:3,ch:7,type:"single",q:"在 STM32CubeMX 生成的 FreeRTOS 工程中，<code>main()</code> 函数的调用顺序是？",opts:["osKernelStart → osKernelInitialize → MX_FREERTOS_Init","osKernelInitialize → MX_FREERTOS_Init → osKernelStart","MX_FREERTOS_Init → osKernelInitialize → osKernelStart","osKernelInitialize → osKernelStart → MX_FREERTOS_Init"],ans:1,explain:"正确的初始化顺序是：先初始化内核，再创建任务，最后启动调度器。"},
{id:4,ch:7,type:"single",q:"在 32 位架构下，<code>BaseType_t</code> 对应的数据类型是？",opts:["uint8_t","uint16_t","uint32_t","int32_t"],ans:2,explain:"BaseType_t 是架构最高效的数据类型，32 位架构下为 uint32_t。"},
{id:5,ch:7,type:"single",q:"FreeRTOS 函数名 <code>vTaskDelay</code> 中，前缀 <code>v</code> 表示什么？",opts:["volatile","void（无返回值）","virtual","vector"],ans:1,explain:"函数名前缀第一部分表示返回值类型，<code>v</code> 表示 void。"},
{id:6,ch:7,type:"single",q:"<code>TickType_t</code> 的实际类型由哪个配置项决定？",opts:["configTICK_RATE_HZ","configUSE_16_BIT_TICKS","configMAX_PRIORITIES","configUSE_PREEMPTION"],ans:1,explain:"当 <code>configUSE_16_BIT_TICKS</code> 为 1 时是 uint16_t，为 0 时是 uint32_t。"},
{id:7,ch:7,type:"multi",q:"FreeRTOS 头文件搜索目录需要包含哪些？（多选）",opts:["FreeRTOS 自身的 include 目录","移植目录（portable）","包含 FreeRTOSConfig.h 的目录","CMSIS 目录"],ans:[0,1,2],explain:"需要 3 个头文件目录：FreeRTOS include、移植目录、含 FreeRTOSConfig.h 的目录。"},

// ===== CH8: 内存管理 =====
{id:8,ch:8,type:"single",q:"以下哪种内存管理方案只分配不回收，没有 <code>vPortFree</code> 函数？",opts:["heap_1","heap_2","heap_3","heap_4"],ans:0,explain:"heap_1 最简单，从数组顺序分配，只分配不回收。"},
{id:9,ch:8,type:"single",q:"哪种内存管理方案会<strong>合并相邻空闲内存</strong>以减少碎片？",opts:["heap_1","heap_2","heap_3","heap_4"],ans:3,explain:"heap_4 采用首次适应算法并合并相邻空闲内存，是推荐方案。"},
{id:10,ch:8,type:"single",q:"<code>heap_5</code> 使用前必须调用哪个函数初始化？",opts:["pvPortMalloc","vPortDefineHeapRegions","xPortGetFreeHeapSize","vPortFree"],ans:1,explain:"heap_5 支持多块不连续内存，使用前必须调用 vPortDefineHeapRegions() 初始化。"},
{id:11,ch:8,type:"single",q:"<code>heap_3</code> 的线程安全是通过什么方式实现的？",opts:["屏蔽中断","互斥量","暂停调度器","原子操作"],ans:2,explain:"heap_3 包装标准库 malloc/free，通过暂停调度器实现线程安全。"},
{id:12,ch:8,type:"tf",q:"<code>xPortGetMinimumEverFreeHeapSize</code> 函数在所有 5 种内存管理方案中都可用。",ans:false,explain:"该函数仅 heap_4 和 heap_5 支持。"},
{id:13,ch:8,type:"single",q:"<code>heap_5</code> 的 <code>HeapRegion_t</code> 数组中，内存区域的排列要求是？",opts:["高地址在前，低地址在后","低地址在前，高地址在后","无顺序要求","按大小降序排列"],ans:1,explain:"必须低地址在前、高地址在后，以 {NULL, 0} 结尾。"},
{id:14,ch:8,type:"single",q:"<code>configAPPLICATION_ALLOCATED_HEAP</code> 设为 1 时，意味着什么？",opts:["使用默认堆内存","应用程序自己定义 ucHeap 数组","禁用堆内存","使用外部 SRAM"],ans:1,explain:"设为 1 时应用程序自己定义 ucHeap 数组，可放在特殊内存段。"},
{id:15,ch:8,type:"single",q:"标准库的 malloc/free 不适合嵌入式系统的原因不包括？",opts:["非线程安全","内存碎片化","运行时间不确定","占用内存太少"],ans:3,explain:"不适合的原因包括非线程安全、碎片化、时间不确定、实现复杂等，而非占用内存少。"},

// ===== CH9: 任务管理 =====
{id:16,ch:9,type:"single",q:"<code>xTaskCreate</code> 创建任务失败时的返回值是？",opts:["pdFAIL (0)","pdFALSE (0)","NULL","errCOULD_NOT_ALLOCATE_REQUIRED_MEMORY (-1)"],ans:3,explain:"注意：失败返回 errCOULD_NOT_ALLOCATE_REQUIRED_MEMORY（值为-1），不是 pdFAIL（值为0）。"},
{id:17,ch:9,type:"single",q:"FreeRTOS 任务有几种状态？",opts:["3种","4种","5种","6种"],ans:1,explain:"4 种状态：运行态、就绪态、阻塞态、暂停态。"},
{id:18,ch:9,type:"single",q:"以下哪个状态只能通过 <code>vTaskSuspend</code> 进入？",opts:["运行态","就绪态","阻塞态","暂停态"],ans:3,explain:"暂停态只能通过 vTaskSuspend 进入，通过 vTaskResume/xTaskResumeFromISR 退出。"},
{id:19,ch:9,type:"single",q:"<code>configTICK_RATE_HZ</code> 设为 1000，则一个 Tick 代表多少时间？",opts:["1ms","10ms","100ms","1s"],ans:0,explain:"1000Hz = 每秒 1000 次中断，每次中断间隔 1ms。"},
{id:20,ch:9,type:"single",q:"<code>vTaskDelay</code> 和 <code>vTaskDelayUntil</code> 的区别是？",opts:["没有区别","vTaskDelay 是相对延时，vTaskDelayUntil 是绝对延时","vTaskDelay 精度更高","vTaskDelayUntil 只能用于 ISR"],ans:1,explain:"vTaskDelay 从调用时刻起等待；vTaskDelayUntil 保证两次退出函数的间隔精确。"},
{id:21,ch:9,type:"tf",q:"任务函数可以正常 return，FreeRTOS 会自动清理任务资源。",ans:false,explain:"任务函数必须永不返回。如果需要退出，必须在 return 前调用 vTaskDelete(NULL)。"},
{id:22,ch:9,type:"single",q:"空闲任务的优先级是多少？",opts:["最高优先级","1","configMAX_PRIORITIES-1","0（最低）"],ans:3,explain:"空闲任务优先级为 0，是最低优先级，由 vTaskStartScheduler() 自动创建。"},
{id:23,ch:9,type:"single",q:"以下哪个配置组合是 FreeRTOS 最常用的调度配置？",opts:["抢占=开，时间片=关，空闲让步=关","抢占=开，时间片=开，空闲让步=开","抢占=关，时间片=开，空闲让步=开","抢占=关，时间片=关，空闲让步=关"],ans:1,explain:"最常用配置：configUSE_PREEMPTION=1, configUSE_TIME_SLICING=1, configIDLE_SHOULD_YIELD=1。"},
{id:24,ch:9,type:"single",q:"<code>xTaskCreate</code> 中栈大小的单位是？",opts:["字节(Byte)","半字(Half-Word)","字(Word)","页(Page)"],ans:2,explain:"栈大小单位为 word（1 word = 4 字节）。"},
{id:25,ch:9,type:"tf",q:"<code>vTaskDelay(pdMS_TO_TICKS(100))</code> 能精确保证 100ms 的延时。",ans:false,explain:"vTaskDelay 是相对延时，不精确。从调用到返回可能略少于指定 Tick 数。"},
{id:26,ch:9,type:"single",q:"使用 <code>vTaskDelete</code> 删除任务后，内存由谁释放？",opts:["vTaskDelete 自己释放","空闲任务释放","调度器释放","需要手动调用 vPortFree"],ans:1,explain:"被删除的任务的内存由空闲任务释放，因此必须确保空闲任务有机会执行。"},

// ===== CH10: 同步互斥与通信 =====
{id:27,ch:10,type:"single",q:"以下哪种内核对象只能由持有者释放（谁上锁谁解锁）？",opts:["队列(Queue)","信号量(Semaphore)","互斥量(Mutex)","事件组(Event Group)"],ans:2,explain:"互斥量的核心特性是「谁上锁，就只能由谁开锁」，像厕所门锁。"},
{id:28,ch:10,type:"single",q:"哪种内核对象具有「广播」效果，能同时唤醒多个等待任务？",opts:["队列","信号量","互斥量","事件组"],ans:3,explain:"事件组有广播特性，一个事件发生时会唤醒所有符合条件的任务。"},
{id:29,ch:10,type:"single",q:"任务通知相比其他内核对象的最大优势是？",opts:["可以缓冲多个数据","效率更高、更省内存","可以广播","可以在 ISR 中接收"],ans:1,explain:"任务通知直接使用 TCB 中的成员，无需额外结构体，效率最高、最省内存。"},
{id:30,ch:10,type:"tf",q:"在裸机中使用静态变量做标志位来实现互斥，在 RTOS 中同样可靠。",ans:false,explain:"在判断和设置之间可能被任务切换打断，导致多个任务同时进入临界区。"},
{id:31,ch:10,type:"single",q:"以下哪种内核对象的生产者只能是持有者本身？",opts:["队列","信号量","事件组","互斥量"],ans:3,explain:"互斥量只能由上锁者释放，其他内核对象的生产者可以是任意任务/ISR。"},

// ===== CH11: 队列 =====
{id:32,ch:11,type:"single",q:"FreeRTOS 队列的数据传输方式是？",opts:["传递指针","拷贝值","共享内存","DMA传输"],ans:1,explain:"FreeRTOS 使用拷贝值方式，优点包括局部变量可安全发送、发送接收任务解耦等。"},
{id:33,ch:11,type:"single",q:"<code>xQueueSend</code> 等同于以下哪个函数？",opts:["xQueueSendToFront","xQueueSendToBack","xQueueOverwrite","xQueuePeek"],ans:1,explain:"xQueueSend 等同于 xQueueSendToBack，写入队列尾部。"},
{id:34,ch:11,type:"single",q:"<code>xQueueOverwrite</code> 对队列长度的要求是？",opts:["无特殊要求","长度必须为1","长度必须大于1","长度必须为0"],ans:1,explain:"xQueueOverwrite 只能用于长度为 1 的队列，满时直接覆盖不会阻塞。"},
{id:35,ch:11,type:"single",q:"<code>xQueueReceive</code> 和 <code>xQueuePeek</code> 的区别是？",opts:["没有区别","Receive 读取并移除，Peek 只读不移除","Receive 阻塞，Peek 不阻塞","Receive 只能在任务中使用"],ans:1,explain:"Receive 读取并移除数据；Peek 读取但不移除，有数据后每次 peek 都成功。"},
{id:36,ch:11,type:"single",q:"队列读取为空时，<code>xTicksToWait</code> 设为 <code>portMAX_DELAY</code> 表示？",opts:["立即返回","阻塞1个Tick","一直阻塞直到有数据","返回错误"],ans:2,explain:"portMAX_DELAY 表示永久阻塞，直到队列有数据可读。"},
{id:37,ch:11,type:"single",q:"队列集（Queue Set）的本质是什么？",opts:["一个特殊的信号量","一个存放队列句柄的队列","一个事件组","一个互斥量"],ans:1,explain:"队列集本质也是队列，存放的是「队列句柄」，用于同时监听多个队列。"},
{id:38,ch:11,type:"tf",q:"<code>xQueueSendFromISR</code> 的 <code>xTicksToWait</code> 参数可以设为 <code>portMAX_DELAY</code> 让 ISR 等待。",ans:false,explain:"ISR 版本不可阻塞，portMAX_DELAY 在 ISR 中无意义，应设为 0。"},
{id:39,ch:11,type:"single",q:"多个任务等待读取同一个队列时，唤醒规则是？",opts:["先进先出","随机唤醒","优先级最高的先唤醒，同优先级则等待最久的先唤醒","全部唤醒"],ans:2,explain:"优先级最高的先被唤醒；同优先级则等待最久的先被唤醒。"},

// ===== CH12: 信号量 =====
{id:40,ch:12,type:"single",q:"新版 <code>xSemaphoreCreateBinary()</code> 创建的二进制信号量，初始计数值是？",opts:["0","1","取决于参数","不确定"],ans:0,explain:"新版初始值为 0。旧版 vSemaphoreCreateBinary 已过时，初始值为 1。"},
{id:41,ch:12,type:"single",q:"信号量的 <code>xSemaphoreGive</code> 操作，对计数值的影响是？",opts:["计数减1","计数加1","计数不变","计数清零"],ans:1,explain:"give 操作计数+1，take 操作计数-1。"},
{id:42,ch:12,type:"single",q:"二进制信号量和计数型信号量的 give/take 函数有什么区别？",opts:["函数完全不同","函数完全相同，区别仅在创建函数和计数上限","二进制信号量没有 FromISR 版本","计数型信号量不能在 ISR 中使用"],ans:1,explain:"两者的 give/take 函数完全相同，区别仅在于创建函数和计数上限。"},
{id:43,ch:12,type:"single",q:"<code>xSemaphoreGiveFromISR</code> 的 <code>pxHigherPriorityTaskWoken</code> 参数设为 NULL 表示？",opts:["出错","不关心是否需要任务切换","强制切换","阻塞等待"],ans:1,explain:"设为 NULL 表示不关心是否需要切换，不影响函数正常执行。"},
{id:44,ch:12,type:"single",q:"信号量与队列的关键区别是？",opts:["信号量不能在 ISR 中使用","信号量只有计数值，无法容纳数据","信号量会阻塞生产者","信号量没有 FromISR 版本"],ans:1,explain:"信号量只有计数值，不传递数据；生产者不会阻塞（计数达最大值时返回失败）。"},
{id:45,ch:12,type:"tf",q:"信号量的 give 和 take 必须由同一个任务完成。",ans:false,explain:"give 和 take 双方不需要是同一个任务/ISR，可用于生产者-消费者场合。"},

// ===== CH13: 互斥量 =====
{id:46,ch:13,type:"single",q:"互斥量的初始值是？",opts:["0","1","取决于参数","不确定"],ans:1,explain:"互斥量是特殊的二进制信号量，初始值为 1（表示可用）。"},
{id:47,ch:13,type:"single",q:"互斥量相比二进制信号量的特殊功能是？",opts:["可以在 ISR 中使用","支持优先级继承","支持广播","支持计数"],ans:1,explain:"互斥量支持优先级继承，用于解决优先级反转问题。"},
{id:48,ch:13,type:"tf",q:"互斥量可以在 ISR 中使用。",ans:false,explain:"互斥量不能在 ISR 中使用，这是它与二进制信号量的关键区别。"},
{id:49,ch:13,type:"single",q:"什么是「优先级反转」？",opts:["高优先级任务等待低优先级任务释放资源，而低优先级任务无法运行","所有任务优先级相同","优先级自动降低","任务优先级被手动修改"],ans:0,explain:"低优先级任务持有锁，中优先级任务抢占 CPU，导致高优先级任务无法从低优先级任务处获得锁。"},
{id:50,ch:13,type:"single",q:"递归锁（Recursive Lock）的特点是？",opts:["只能获取一次","同一任务可多次获取，take 了 N 次需 give N 次","任何任务都可以释放","自动释放"],ans:1,explain:"递归锁允许同一任务多次获取同一把锁，take 了 N 次就需要 give N 次才会真正释放。"},
{id:51,ch:13,type:"single",q:"使用互斥量时，<code>configUSE_MUTEXES</code> 需要在哪个文件中定义？",opts:["main.c","FreeRTOSConfig.h","tasks.c","port.c"],ans:1,explain:"需要在 FreeRTOSConfig.h 中定义 configUSE_MUTEXES 为 1。"},
{id:52,ch:13,type:"single",q:"「死锁」指的是什么情况？",opts:["任务被暂停","两个任务互相持有对方需要的互斥量，导致永久阻塞","中断被屏蔽","调度器停止"],ans:1,explain:"两个任务互相持有对方需要的互斥量，导致两者都无法继续执行。"},

// ===== CH14: 事件组 =====
{id:53,ch:14,type:"single",q:"事件组本质上是一个什么数据结构？",opts:["队列","链表","整数（每一位表示一个事件）","数组"],ans:2,explain:"事件组本质上是一个整数，每一位表示一个事件（1=发生，0=未发生）。"},
{id:54,ch:14,type:"single",q:"当 <code>configUSE_16_BIT_TICKS</code> 为 0 时，事件组可用的事件位有多少个？",opts:["8个","16个","24个","32个"],ans:2,explain:"32位整数，高8位留给内核，低24位用于事件。"},
{id:55,ch:14,type:"single",q:"<code>xEventGroupWaitBits</code> 中，<code>xWaitForAllBits</code> 设为 <code>pdTRUE</code> 表示？",opts:["任意一位为1即满足","所有指定位都为1才满足","忽略所有位","自动清除"],ans:1,explain:"pdTRUE 表示「与」模式，等待的所有位都为 1 才满足条件。"},
{id:56,ch:14,type:"single",q:"<code>xEventGroupSetBitsFromISR</code> 是如何设置事件位的？",opts:["直接在中断中设置","通过发送命令给守护任务间接设置","通过暂停调度器设置","通过屏蔽中断设置"],ans:1,explain:"ISR 版本通过发送队列数据给守护任务来间接设置，因为可能唤醒多个任务。"},
{id:57,ch:14,type:"single",q:"<code>xEventGroupSync</code> 成功返回后会自动做什么？",opts:["暂停调度器","清除事件","重启定时器","删除事件组"],ans:1,explain:"xEventGroupSync 成功返回后会自动清除事件。"},
{id:58,ch:14,type:"tf",q:"在等待事件后应分两步操作：先 <code>xEventGroupWaitBits</code> 再 <code>xEventGroupClearBits</code> 来清除事件。",ans:false,explain:"分两步操作中间可能被抢占。应使用 xClearOnExit=pdTRUE 实现原子操作。"},

// ===== CH15: 任务通知 =====
{id:59,ch:15,type:"single",q:"任务通知的数据存储在哪里？",opts:["队列中","信号量中","任务的 TCB 中（ulNotifiedValue）","全局变量中"],ans:2,explain:"任务通知直接使用 TCB 中的 ulNotifiedValue 和 ucNotifyState 成员。"},
{id:60,ch:15,type:"single",q:"<code>xTaskNotifyGive</code> 对通知值的操作是？",opts:["设置为指定值","清零","加一","取反"],ans:2,explain:"xTaskNotifyGive 使通知值加一，通知状态变为 pending。"},
{id:61,ch:15,type:"single",q:"<code>ulTaskNotifyTake</code> 的 <code>xClearCountOnExit</code> 设为 <code>pdFALSE</code> 表示？",opts:["清零通知值","通知值减一","阻塞等待","忽略通知"],ans:1,explain:"pdFALSE 表示取出后通知值减一（类似计数型信号量）；pdTRUE 表示清零。"},
{id:62,ch:15,type:"single",q:"<code>eNotifyAction</code> 取 <code>eSetValueWithOverwrite</code> 时，行为等价于？",opts:["轻量级二进制信号量","轻量级事件组","轻量级邮箱（覆盖型队列）","轻量级计数型信号量"],ans:2,explain:"无论是否有 pending 数据都覆盖为 ulValue，等价于轻量级邮箱。"},
{id:63,ch:15,type:"single",q:"任务通知相比队列的限制不包括？",opts:["只有一个通知值，无法缓冲","不能广播给多个任务","发送方无法阻塞等待","不能在 ISR 中使用"],ans:3,explain:"任务通知可以在 ISR 中使用（通过 FromISR 版本），限制是不能缓冲、不能广播、发送方不能阻塞。"},
{id:64,ch:15,type:"single",q:"<code>xTaskNotify</code> 返回 <code>pdFAIL</code> 的唯一情况是？",opts:["通知值为0","目标任务不存在","eAction=eSetValueWithoutOverwrite 且通知状态为 pending","超时"],ans:2,explain:"仅在 eSetValueWithoutOverwrite 模式下且已有 pending 数据时返回失败。"},
{id:65,ch:15,type:"single",q:"<code>eNotifyAction</code> 取 <code>eSetBits</code> 时，行为等价于？",opts:["轻量级队列","轻量级事件组","轻量级信号量","轻量级互斥量"],ans:1,explain:"eSetBits 将通知值与 ulValue 做 OR 操作，等价于轻量级事件组。"},

// ===== CH16: 软件定时器 =====
{id:66,ch:16,type:"single",q:"软件定时器的回调函数在哪里执行？",opts:["Tick 中断中","守护任务中","空闲任务中","调用 xTimerStart 的任务中"],ans:1,explain:"定时器回调函数不在 Tick 中断中执行，而是在守护任务（Daemon Task）中执行。"},
{id:67,ch:16,type:"single",q:"<code>xTimerStart</code> 的 <code>xTicksToWait</code> 参数代表什么？",opts:["定时器的超时周期","写入命令队列的超时时间","回调函数执行时间","定时器运行时间"],ans:1,explain:"xTicksToWait 是写入命令队列的超时时间，不是定时器本身的周期。"},
{id:68,ch:16,type:"tf",q:"<code>xTimerStart()</code> 返回时，定时器已经完成启动。",ans:false,explain:"xTimerStart 是异步操作，通过发送命令到队列实现，返回不等于定时器已启动。"},
{id:69,ch:16,type:"single",q:"在软件定时器的回调函数中，以下哪个操作是<strong>禁止</strong>的？",opts:["调用 xQueueReceive","调用 vTaskDelay","读取全局变量","调用 xTimerChangePeriod"],ans:1,explain:"回调函数在守护任务中执行，不能调用 vTaskDelay() 等阻塞函数。"},
{id:70,ch:16,type:"single",q:"自动加载定时器（Auto-reload）的特点是？",opts:["回调函数只执行一次","周期性自动重新启动","需要手动重启","只能在 ISR 中触发"],ans:1,explain:"自动加载定时器会周期性自动重新启动，回调函数被周期性调用。"},
{id:71,ch:16,type:"single",q:"<code>xTimerChangePeriod</code> 除了修改周期外，还会做什么？",opts:["停止定时器","复位定时器","启动定时器","删除定时器"],ans:2,explain:"xTimerChangePeriod 不仅修改周期，还会启动定时器。"},
{id:72,ch:16,type:"single",q:"定时器超时时间的计算基准是？",opts:["守护任务处理命令的时刻","调用 xTimerStart() 的时刻","系统启动时刻","上次回调执行的时刻"],ans:1,explain:"超时时间基于调用 xTimerStart() 的时刻 tX，超时 = tX + period。"},
{id:73,ch:16,type:"single",q:"当 <code>configUSE_TIMERS=1</code> 时，守护任务的优先级由什么决定？",opts:["configMAX_PRIORITIES","configTIMER_TASK_PRIORITY","configIDLE_TASK_PRIORITY","固定为最高"],ans:1,explain:"守护任务优先级由 configTIMER_TASK_PRIORITY 配置项决定。"},

// ===== CH17: 中断管理 =====

const chapters = [
  {id:7,  num:"第7章",  title:"FreeRTOS源码概述"},
  {id:8,  num:"第8章",  title:"内存管理"},
  {id:9,  num:"第9章",  title:"任务管理"},
  {id:10, num:"第10章", title:"同步互斥与通信"},
  {id:11, num:"第11章", title:"队列(Queue)"},
  {id:12, num:"第12章", title:"信号量(Semaphore)"},
  {id:13, num:"第13章", title:"互斥量(Mutex)"},
  {id:14, num:"第14章", title:"事件组(Event Group)"},
  {id:15, num:"第15章", title:"任务通知(Task Notifications)"},
  {id:16, num:"第16章", title:"软件定时器(Software Timer)"},
  {id:17, num:"第17章", title:"中断管理(Interrupt Management)"},
  {id:18, num:"第18章", title:"资源管理(Resource Management)"},
  {id:19, num:"第19章", title:"调试与优化"}
];

// ===== STATE =====
let currentQuiz = [];       // questions in current quiz
let currentIdx = 0;         // current question index
let userAnswers = [];       // user's answers (null = not answered)
let quizChapter = null;     // chapter id or null for mixed

// Persistent stats
let stats = JSON.parse(localStorage.getItem('freertos_quiz_stats') || '{}');
// stats = { qid: { correct: bool, answered: true } }

function getGlobalStats() {
  const total = questions.length;
  let done = 0, correct = 0;
  for (const q of questions) {
    if (stats[q.id]) {
      done++;
      if (stats[q.id].correct) correct++;
    }
  }
  return { total, done, correct, rate: done > 0 ? Math.round(correct/done*100) : -1 };
}

function updateGlobalStats() {
  const s = getGlobalStats();
  document.getElementById('statTotal').textContent = s.total;
  document.getElementById('statDone').textContent = s.done;
  document.getElementById('statCorrect').textContent = s.correct;
  document.getElementById('statRate').textContent = s.rate >= 0 ? s.rate + '%' : '-';
}

// ===== SCREENS =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  showScreen('screenHome');
  renderChapters();
  updateGlobalStats();
}

// ===== HOME: CHAPTER GRID =====
function renderChapters() {
  const grid = document.getElementById('chapterGrid');
  grid.innerHTML = '';
  for (const ch of chapters) {
    const qs = questions.filter(q => q.ch === ch.id);
    const done = qs.filter(q => stats[q.id]).length;
    const pct = qs.length > 0 ? Math.round(done / qs.length * 100) : 0;
    const card = document.createElement('div');
    card.className = 'chapter-card';
    card.innerHTML = `
      <div class="chapter-num">${ch.num}</div>
      <div class="chapter-title">${ch.title}</div>
      <div class="chapter-meta">${qs.length} 道题 · 已完成 ${done}/${qs.length}</div>
      <div class="chapter-progress"><div class="chapter-progress-fill" style="width:${pct}%"></div></div>
    `;
    card.onclick = () => startChapter(ch.id);
    grid.appendChild(card);
  }
}

function startChapter(chId) {
  quizChapter = chId;
  const ch = chapters.find(c => c.id === chId);
  currentQuiz = [...questions.filter(q => q.ch === chId)];
  shuffle(currentQuiz);
  currentIdx = 0;
  userAnswers = new Array(currentQuiz.length).fill(null);
  document.getElementById('quizTitle').textContent = ch.num + ' ' + ch.title;
  showScreen('screenQuiz');
  renderQuestion();
}

function startMixed() {
  quizChapter = null;
  const pool = [...questions];
  shuffle(pool);
  currentQuiz = pool.slice(0, 20);
  currentIdx = 0;
  userAnswers = new Array(currentQuiz.length).fill(null);
  document.getElementById('quizTitle').textContent = '综合测试';
  showScreen('screenQuiz');
  renderQuestion();
}

function retryQuiz() {
  if (quizChapter !== null) {
    startChapter(quizChapter);
  } else {
    startMixed();
  }
}

// ===== QUIZ RENDERING =====
function renderQuestion() {
  const q = currentQuiz[currentIdx];
  const total = currentQuiz.length;
  document.getElementById('quizCounter').textContent = `${currentIdx+1} / ${total}`;
  document.getElementById('progressFill').style.width = ((currentIdx+1)/total*100) + '%';
  document.getElementById('btnPrev').disabled = currentIdx === 0;
  if (currentIdx === total - 1) {
    document.getElementById('btnNext').style.display = 'none';
    document.getElementById('btnSubmit').style.display = '';
  } else {
    document.getElementById('btnNext').style.display = '';
    document.getElementById('btnSubmit').style.display = 'none';
  }

  const area = document.getElementById('questionArea');
  const chTag = q.ch > 0 ? `<span class="q-chapter-tag">第${q.ch}章</span>` : '<span class="q-chapter-tag">综合</span>';
  let typeBadge = '';
  let body = '';

  if (q.type === 'single') {
    typeBadge = '<span class="q-type-badge single">单选</span>';
    body = renderOptions(q, userAnswers[currentIdx]);
  } else if (q.type === 'tf') {
    typeBadge = '<span class="q-type-badge tf">判断</span>';
    body = renderOptions(q, userAnswers[currentIdx], true);
  } else if (q.type === 'fill') {
    typeBadge = '<span class="q-type-badge fill">填空</span>';
    const answered = userAnswers[currentIdx] !== null;
    body = `<div class="fill-input-wrap">
      <input class="fill-input" id="fillInput" placeholder="输入答案..." ${answered ? 'disabled' : ''} value="${answered ? userAnswers[currentIdx] : ''}" onkeydown="if(event.key==='Enter')submitFill()">
      <button class="btn btn-primary" onclick="submitFill()" ${answered ? 'style="display:none"' : ''}>确认</button>
    </div>`;
    if (answered) body += renderFeedback(q, userAnswers[currentIdx]);
  } else if (q.type === 'multi') {
    typeBadge = '<span class="q-type-badge multi">多选</span>';
    body = renderMultiOptions(q, userAnswers[currentIdx]);
  }

  area.innerHTML = `
    <div class="question-card">
      ${typeBadge}${chTag}
      <div class="q-text">${q.q}</div>
      ${body}
    </div>
  `;
}

function renderOptions(q, userAns, isTf) {
  const opts = isTf ? ['正确', '错误'] : q.opts;
  const letters = ['A','B','C','D'];
  let html = '<div class="options">';
  for (let i = 0; i < opts.length; i++) {
    let cls = 'option-btn';
    if (userAns !== null) {
      cls += ' disabled';
      if (i === q.ans) cls += ' correct';
      if (i === userAns && i !== q.ans) cls += ' wrong';
      if (i === userAns) cls += ' selected';
    }
    const letter = isTf ? (i === 0 ? '✓' : '✗') : letters[i];
    html += `<button class="${cls}" onclick="selectOption(${i})" ${userAns !== null ? 'disabled' : ''}>
      <span class="option-letter">${letter}</span>
      <span>${opts[i]}</span>
    </button>`;
  }
  html += '</div>';
  if (userAns !== null) html += renderFeedback(q, userAns);
  return html;
}

function renderMultiOptions(q, userAns) {
  const letters = ['A','B','C','D'];
  let html = '<div class="options">';
  const ansArr = q.ans;
  for (let i = 0; i < q.opts.length; i++) {
    let cls = 'option-btn';
    if (userAns !== null) {
      cls += ' disabled';
      if (ansArr.includes(i)) cls += ' correct';
      if (userAns.includes(i) && !ansArr.includes(i)) cls += ' wrong';
      if (userAns.includes(i)) cls += ' selected';
    }
    html += `<button class="${cls}" onclick="toggleMultiOption(${i})" ${userAns !== null ? 'disabled' : ''}>
      <span class="option-letter">${letters[i]}</span>
      <span>${q.opts[i]}</span>
    </button>`;
  }
  html += '</div>';
  if (userAns !== null) {
    html += `<div style="margin-top:10px"><button class="btn btn-primary" onclick="submitMulti()" ${userAns !== null ? 'style="display:none"' : ''}>确认</button></div>`;
    html += renderFeedback(q, userAns);
  } else {
    html += `<div style="margin-top:10px"><button class="btn btn-primary" onclick="submitMulti()">确认选择</button></div>`;
  }
  return html;
}

let multiSelected = [];

function toggleMultiOption(idx) {
  if (userAnswers[currentIdx] !== null) return;
  const pos = multiSelected.indexOf(idx);
  if (pos >= 0) multiSelected.splice(pos, 1);
  else multiSelected.push(idx);
  // Re-render options visually
  const btns = document.querySelectorAll('#questionArea .option-btn');
  btns.forEach((btn, i) => {
    btn.classList.toggle('selected', multiSelected.includes(i));
  });
}

function submitMulti() {
  if (userAnswers[currentIdx] !== null) return;
  if (multiSelected.length === 0) return;
  userAnswers[currentIdx] = [...multiSelected].sort();
  multiSelected = [];
  const q = currentQuiz[currentIdx];
  const correct = arraysEqual(userAnswers[currentIdx], q.ans);
  stats[q.id] = { correct, answered: true };
  localStorage.setItem('freertos_quiz_stats', JSON.stringify(stats));
  renderQuestion();
}

function selectOption(idx) {
  if (userAnswers[currentIdx] !== null) return;
  userAnswers[currentIdx] = idx;
  const q = currentQuiz[currentIdx];
  const correct = idx === q.ans;
  stats[q.id] = { correct, answered: true };
  localStorage.setItem('freertos_quiz_stats', JSON.stringify(stats));
  renderQuestion();
}

function submitFill() {
  if (userAnswers[currentIdx] !== null) return;
  const input = document.getElementById('fillInput');
  if (!input || !input.value.trim()) return;
  const val = input.value.trim();
  userAnswers[currentIdx] = val;
  const q = currentQuiz[currentIdx];
  const correct = val.toLowerCase() === q.ans.toLowerCase();
  stats[q.id] = { correct, answered: true };
  localStorage.setItem('freertos_quiz_stats', JSON.stringify(stats));
  renderQuestion();
}

function renderFeedback(q, userAns) {
  let isCorrect = false;
  if (q.type === 'multi') {
    isCorrect = arraysEqual(userAns, q.ans);
  } else if (q.type === 'fill') {
    isCorrect = userAns.toLowerCase() === q.ans.toLowerCase();
  } else {
    isCorrect = userAns === q.ans;
  }
  const cls = isCorrect ? 'correct' : 'wrong';
  const icon = isCorrect ? '✓ 回答正确！' : '✗ 回答错误';
  let correctText = '';
  if (!isCorrect) {
    if (q.type === 'single') correctText = `正确答案：${['A','B','C','D'][q.ans]} - ${q.opts[q.ans]}`;
    else if (q.type === 'tf') correctText = `正确答案：${q.ans ? '正确' : '错误'}`;
    else if (q.type === 'multi') correctText = `正确答案：${q.ans.map(i=>['A','B','C','D'][i]).join(', ')}`;
    else if (q.type === 'fill') correctText = `正确答案：${q.ans}`;
  }
  return `<div class="feedback ${cls}">
    <strong>${icon}</strong>
    ${correctText ? '<br>' + correctText : ''}
    ${q.explain ? `<div class="explain">💡 ${q.explain}</div>` : ''}
  </div>`;
}

function arraysEqual(a, b) {
  if (a.length !== b.length) return false;
  for (let i = 0; i < a.length; i++) if (a[i] !== b[i]) return false;
  return true;
}

// ===== NAVIGATION =====
function prevQ() {
  if (currentIdx > 0) {
    currentIdx--;
    multiSelected = [];
    renderQuestion();
  }
}

function nextQ() {
  if (currentIdx < currentQuiz.length - 1) {
    currentIdx++;
    multiSelected = [];
    renderQuestion();
  }
}

function finishQuiz() {
  // Check if all answered
  const unanswered = userAnswers.filter(a => a === null).length;
  if (unanswered > 0) {
    if (!confirm(`还有 ${unanswered} 道题未作答，确定提交吗？`)) return;
  }
  showResults();
}

function showResults() {
  let correct = 0, wrong = 0;
  for (let i = 0; i < currentQuiz.length; i++) {
    const q = currentQuiz[i];
    const ua = userAnswers[i];
    if (ua === null) { wrong++; continue; }
    let isCorrect = false;
    if (q.type === 'multi') isCorrect = arraysEqual(ua, q.ans);
    else if (q.type === 'fill') isCorrect = ua.toLowerCase() === q.ans.toLowerCase();
    else isCorrect = ua === q.ans;
    if (isCorrect) correct++; else wrong++;
  }
  const total = currentQuiz.length;
  const rate = Math.round(correct / total * 100);

  document.getElementById('resultScore').textContent = rate + '%';
  document.getElementById('resultCorrect').textContent = correct;
  document.getElementById('resultWrong').textContent = wrong;
  document.getElementById('resultTotal').textContent = total;

  const list = document.getElementById('reviewList');
  list.innerHTML = '';
  for (let i = 0; i < currentQuiz.length; i++) {
    const q = currentQuiz[i];
    const ua = userAnswers[i];
    let isCorrect = false;
    if (ua === null) isCorrect = false;
    else if (q.type === 'multi') isCorrect = arraysEqual(ua, q.ans);
    else if (q.type === 'fill') isCorrect = ua.toLowerCase() === q.ans.toLowerCase();
    else isCorrect = ua === q.ans;

    const item = document.createElement('div');
    item.className = 'review-item ' + (isCorrect ? 'correct-item' : 'wrong-item');
    const plainQ = q.q.replace(/<[^>]+>/g, '');
    item.innerHTML = `
      <div class="review-item-header">
        <span class="review-item-num">第 ${i+1} 题</span>
        <span class="review-item-status ${isCorrect ? 's' : 'f'}">${isCorrect ? '✓ 正确' : '✗ 错误'}</span>
      </div>
      <div class="review-item-text">${plainQ}</div>
    `;
    item.onclick = () => {
      showScreen('screenQuiz');
      currentIdx = i;
      renderQuestion();
    };
    list.appendChild(item);
  }

  showScreen('screenResults');
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ===== INIT =====
renderChapters();
updateGlobalStats();

// Multi-select init on entering a multi question
const origRender = renderQuestion;
renderQuestion = function() {
  multiSelected = [];
  origRender();
};
</script>
